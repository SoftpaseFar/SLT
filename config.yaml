# Trasformer模型参数
transformer:
  # 模型超参数
  input_dim: 512  # 输入维度
  output_dim: 512  # 输出维度
  hidden_dim: 1024  # 隐藏层维度
  num_layers: 6  # 层数
  num_heads: 8  # 注意力头数
  dropout: 0.1  # Dropout比率
  learning_rate: 1e-4  # 学习率
  batch_size: 64  # 批量大小
  num_epochs: 10  # 训练轮数

# 其他参数
data:
  train_label_path: ./data/Phonexi-2014T/labels.train
  dev_label_path: ./data/Phonexi-2014T/labels.dev
  test_label_path: ./data/Phonexi-2014T/labels.test
  img_path: /mnt/Data/datasets/SLT/PHOENIX-2014-T/fullFrame-210x260px/
  max_length: 300

model:
  tokenizer: /pretrain_models/MBart_trimmed

